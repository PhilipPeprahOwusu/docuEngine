apiVersion: v1
kind: Secret
metadata:
  name: docuengine-secrets
  namespace: docuengine
type: Opaque
stringData:
  # Database
  DB_PASSWORD: "changeme-use-aws-secrets-manager"
  DATABASE_URL: "postgresql://docuser:changeme@postgres-service:5432/document_intelligence"

  # Application
  SECRET_KEY: "your-secret-key-here-change-in-production"

  # LLM APIs (set one based on your provider)
  LLM_PROVIDER: "openai"
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  ANTHROPIC_API_KEY: ""

  # AWS
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # Notifications
  SLACK_BOT_TOKEN: ""
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  DISCORD_BOT_TOKEN: ""
---
# NOTE: In production, use AWS Secrets Manager or External Secrets Operator
# Example with External Secrets Operator:
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: aws-secrets-manager
#   namespace: docuengine
# spec:
#   provider:
#     aws:
#       service: SecretsManager
#       region: us-east-1
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: docuengine-sa
