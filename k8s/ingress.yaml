apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docuengine-ingress
  namespace: docuengine
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:<AWS_REGION>:<AWS_ACCOUNT_ID>:certificate/<CERTIFICATE_ID>
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/tags: Environment=production,Application=docuengine
spec:
  rules:
  - host: api.docuengine.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: docuengine-service
            port:
              number: 80
