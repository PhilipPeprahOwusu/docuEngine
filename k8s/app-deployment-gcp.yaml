apiVersion: apps/v1
kind: Deployment
metadata:
  name: docuengine-app
  namespace: docuengine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: docuengine-app
  template:
    metadata:
      labels:
        app: docuengine-app
    spec:
      containers:
      - name: app
        image: us-central1-docker.pkg.dev/docu-engine-499519/docuengine/app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: docuengine-config
        - secretRef:
            name: docuengine-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: docuengine-service
  namespace: docuengine
spec:
  selector:
    app: docuengine-app
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: LoadBalancer
