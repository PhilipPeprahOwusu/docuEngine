apiVersion: apps/v1
kind: Deployment
metadata:
  name: docuengine-app
  namespace: docuengine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: docuengine-app
  template:
    metadata:
      labels:
        app: docuengine-app
    spec:
      serviceAccountName: docuengine-sa
      containers:
      - name: app
        image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/docuengine:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: docuengine-config
        - secretRef:
            name: docuengine-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: docuengine-service
  namespace: docuengine
spec:
  selector:
    app: docuengine-app
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: LoadBalancer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: docuengine-sa
  namespace: docuengine
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/DocuengineEKSRole
