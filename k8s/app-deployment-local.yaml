apiVersion: apps/v1
kind: Deployment
metadata:
  name: docuengine-app
  namespace: docuengine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docuengine-app
  template:
    metadata:
      labels:
        app: docuengine-app
    spec:
      containers:
      - name: app
        image: docuengine:local  # Local image, no registry needed
        imagePullPolicy: Never  # Don't try to pull from registry
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: docuengine-config
        - secretRef:
            name: docuengine-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: docuengine-service
  namespace: docuengine
spec:
  type: NodePort  # Use NodePort instead of LoadBalancer for local
  selector:
    app: docuengine-app
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30080  # Access via localhost:30080
      protocol: TCP
