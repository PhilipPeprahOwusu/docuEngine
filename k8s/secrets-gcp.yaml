apiVersion: v1
kind: Secret
metadata:
  name: docuengine-secrets
  namespace: docuengine
type: Opaque
stringData:
  # Database credentials
  DB_PASSWORD: "YOUR-PASSWORD-HERE"
  DATABASE_URL: "postgresql://docuser:YOUR-PASSWORD-HERE@postgres-service:5432/document_intelligence"

  # Application secret key (generate a random one)
  SECRET_KEY: "YOUR-SECRET-HERE"

  # LLM Provider Selection (choose one: openai, gemini, or anthropic)
  LLM_PROVIDER: "anthropic"

  # API Keys (fill in the one you're using)
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  ANTHROPIC_API_KEY: "sk-ant-YOUR-KEY-HERE"

  # Optional: AWS S3 credentials (if you want file storage)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: ""
